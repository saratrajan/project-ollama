name: Local Config
version: 1.0.0
schema: v1
models:
  - name: Qwen2.5-Coder 3B
    provider: ollama
    model: qwen2.5-coder:3b
    roles:
      - chat
      - edit
      - apply
      - agent
  - name: Qwen2.5-Coder 1.5B
    provider: ollama
    model: qwen2.5-coder:1.5b-base
    apiBase: http://localhost:11434
    roles:
      - autocomplete
    autocompleteOptions:
      debounceDelay: 350          # ms to wait after you stop typing
      maxPromptTokens: 1024       # reduce to 512 if autocomplete feels slow
      onlyMyCode: true            # ignore node_modules / site-packages
      useCache: true
      useImports: true
      useRecentlyEdited: true
    defaultCompletionOptions:
      temperature: 0.2       
  - name: Nomic Embed
    provider: ollama
    model: nomic-embed-text:latest
    apiBase: http://localhost:11434
    roles:
      - embed